<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  <head>
    
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <title>{{ site.title }}{% if page.title and page.title != "" %} &mdash; {{ page.title }}{% endif %}</title>

    {% if site.description %}<meta name="description" content="{{ site.description }}">{% endif %}  

    <link rel="stylesheet" href="{{ '/assets/css/main.css' | absolute_url }}?{{ site.time | date: '%s%N' }}">

    <link rel="apple-touch-icon" href="{{ site.icon }}">

    <style>
      .post-category {
        display: inline-block;
        background-color: #f9f9f9;
        color: #555;
        padding: 0.15em 0.5em;
        border-radius: 3px;
        border: 1px solid #e0e0e0;
        font-size: 0.75em;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-right: 0.5em;
        vertical-align: middle;
      }
      .post-list .post-date,
      .post-list .post-meta time {
        font-size: 0;
        display: inline-flex;
        align-items: center;
        vertical-align: middle;
      }
      .post-list .post-category {
        font-size: 12px;
      }
    </style>

    {%- if jekyll.environment == 'production' and site.google_analytics -%}
      {%- include google-analytics.html -%}
    {%- endif -%}

  </head>
  <body>

    {% if page.layout == 'home' %}
      <a href="#main" class="skip-navigation">
        Skip to list of posts
      </a>
    {% else %}
      <a href="#main" class="skip-navigation">
        Skip to content
      </a>
    {% endif %}

    {{ content }}

  </body>
</html>
